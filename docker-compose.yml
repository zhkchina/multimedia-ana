x-video-vl-common-env: &video_vl_common_env
  DATA_ROOT: /data/multimedia-ana
  HOME: /data/multimedia-ana/video-vl/cache/home
  USER: kun
  LOGNAME: kun
  SERVICE_NAME: video-vl
  HOST_PROJECT_DIR: /home/kun/tools/multimedia-ana
  HOST_UID: 1001
  HOST_GID: 1003
  VIDEO_VL_MODEL_ID: Qwen/Qwen3-VL-8B-Instruct
  HF_HOME: /data/multimedia-ana/video-vl/cache/huggingface

x-audio-common-env: &audio_common_env
  DATA_ROOT: /data/multimedia-ana
  HOME: /data/multimedia-ana/audio/cache/home
  USER: kun
  LOGNAME: kun
  SERVICE_NAME: audio
  HOST_PROJECT_DIR: /home/kun/tools/multimedia-ana
  HOST_UID: 1001
  HOST_GID: 1003
  AUDIO_MODEL_ID: iic/SenseVoiceSmall
  AUDIO_VAD_MODEL_ID: fsmn-vad
  AUDIO_DEVICE: cuda:0
  HF_HOME: /data/multimedia-ana/audio/cache/huggingface
  MODELSCOPE_CACHE: /data/multimedia-ana/audio/cache/modelscope

services:
  docker-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: multimedia-ana-api:local
    container_name: multimedia-ana-api
    restart: unless-stopped
    user: "1001:1003"
    group_add:
      - "1002"
    environment:
      <<: *video_vl_common_env
      APP_TITLE: Multimedia Analysis API
      API_PORT: 7860
      DOCKER_GID: 1002
      WORKER_IMAGE: multimedia-ana-video-vl-worker:local
      WORKER_CONTAINER_NAME: multimedia-ana-video-vl-worker
      WORKER_NETWORK_NAME: multimedia-ana_default
      WORKER_SHM_SIZE: 16g
      WORKER_IDLE_TIMEOUT_SECONDS: 1800
      WORKER_POLL_INTERVAL_SECONDS: 3
    ports:
      - "0.0.0.0:18086:7860"
    volumes:
      - .:/workspace:ro
      - /data/multimedia-ana:/data/multimedia-ana
      - /var/run/docker.sock:/var/run/docker.sock

  video-vl-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: multimedia-ana-video-vl-worker:local
    user: "1001:1003"
    environment:
      <<: *video_vl_common_env
      WORKER_CONTAINER_NAME: multimedia-ana-video-vl-worker
      WORKER_NETWORK_NAME: multimedia-ana_default
      WORKER_IDLE_TIMEOUT_SECONDS: 1800
      WORKER_POLL_INTERVAL_SECONDS: 3
    volumes:
      - .:/workspace:ro
      - /data/multimedia-ana:/data/multimedia-ana
    command: ["python3", "-m", "app.worker.worker_entry"]
    gpus: all
    shm_size: 16g

  audio-api:
    build:
      context: .
      dockerfile: Dockerfile.audio_api
    image: multimedia-ana-audio-api:local
    container_name: multimedia-ana-audio-api
    restart: unless-stopped
    user: "1001:1003"
    group_add:
      - "1002"
    environment:
      <<: *audio_common_env
      APP_TITLE: Multimedia Audio ASR API
      API_PORT: 7860
      DOCKER_GID: 1002
      WORKER_IMAGE: multimedia-ana-audio-worker:local
      WORKER_CONTAINER_NAME: multimedia-ana-audio-worker
      WORKER_NETWORK_NAME: multimedia-ana_default
      WORKER_SHM_SIZE: 8g
      WORKER_IDLE_TIMEOUT_SECONDS: 1800
      WORKER_POLL_INTERVAL_SECONDS: 5
    ports:
      - "0.0.0.0:18088:7860"
    volumes:
      - .:/workspace:ro
      - /data/multimedia-ana:/data/multimedia-ana
      - /var/run/docker.sock:/var/run/docker.sock

  audio-worker:
    build:
      context: .
      dockerfile: Dockerfile.audio_worker
    image: multimedia-ana-audio-worker:local
    user: "1001:1003"
    environment:
      <<: *audio_common_env
      WORKER_CONTAINER_NAME: multimedia-ana-audio-worker
      WORKER_NETWORK_NAME: multimedia-ana_default
      WORKER_IDLE_TIMEOUT_SECONDS: 1800
      WORKER_POLL_INTERVAL_SECONDS: 5
      WORKER_LOG_LEVEL: INFO
    volumes:
      - .:/workspace:ro
      - /data/multimedia-ana:/data/multimedia-ana
    command: ["python3", "-m", "app.audio_worker.worker_entry"]
    gpus: all
    shm_size: 8g

  video-scene:
    build:
      context: .
      dockerfile: Dockerfile.scene
    image: multimedia-ana-video-scene:local
    container_name: multimedia-ana-video-scene
    restart: unless-stopped
    user: "1001:1003"
    environment:
      APP_TITLE: Video Scene API
      API_PORT: 7860
      API_LOG_LEVEL: INFO
      DATA_ROOT: /data/multimedia-ana
      HOME: /data/multimedia-ana/video-scene/cache/home
      USER: kun
      LOGNAME: kun
      SERVICE_NAME: video-scene
      HOST_PROJECT_DIR: /home/kun/tools/multimedia-ana
      HOST_UID: 1001
      HOST_GID: 1003
    ports:
      - "0.0.0.0:18087:7860"
    volumes:
      - .:/workspace:ro
      - /data/multimedia-ana:/data/multimedia-ana
